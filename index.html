<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Evaluación - Modernización de Sitio Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --accent: #f97316;
            --success: #10b981;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #eff6ff 100%);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            font-size: 1.1em;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .form-section {
            background: var(--card);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.5s ease-out;
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            gap: 12px;
        }

        .section-icon {
            font-size: 1.5em;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .section-header h2 {
            font-size: 1.5em;
            color: var(--text);
            margin: 0;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
            font-size: 0.95em;
        }

        .required {
            color: var(--accent);
            margin-left: 3px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .checkbox-group,
        .radio-group {
            display: grid;
            gap: 12px;
        }

        .checkbox-item,
        .radio-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .checkbox-item:hover,
        .radio-item:hover {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.05);
        }

        input[type="checkbox"],
        input[type="radio"] {
            margin-top: 3px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .checkbox-label,
        .radio-label {
            flex: 1;
            margin: 0;
            cursor: pointer;
            font-weight: 500;
        }

        .checkbox-desc {
            font-size: 0.85em;
            color: var(--text-light);
            margin-top: 4px;
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .two-columns {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .form-section {
                padding: 20px;
            }
        }

        .form-buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
        }

        button {
            padding: 14px 35px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            min-width: 200px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-reset {
            background: var(--border);
            color: var(--text);
        }

        .btn-reset:hover {
            background: #cbd5e1;
        }

        .hidden-field {
            display: none;
        }

        .help-text {
            font-size: 0.85em;
            color: var(--text-light);
            margin-top: 6px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Evaluación de Proyecto</h1>
            <p>Modernización de Sitio Web - Formulario de Cotización</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </header>

        <form id="evaluationForm" action="https://formspree.io/f/xwvrbwav" method="POST">
            <!-- Campo oculto para confirmación -->
            <input type="hidden" name="_next" value="">
            <input type="hidden" name="_subject" value="Nueva Evaluación de Proyecto Web">

            <!-- INFORMACIÓN GENERAL -->
            <div class="form-section">
                <div class="section-header">
                    <div class="section-icon">👤</div>
                    <h2>Información General</h2>
                </div>

                <div class="two-columns">
                    <div class="form-group">
                        <label>Nombre/Empresa <span class="required">*</span></label>
                        <input type="text" name="Empresa" required>
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico <span class="required">*</span></label>
                        <input type="email" name="email" required>
                    </div>
                </div>

                <div class="two-columns">
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="tel" name="Teléfono">
                    </div>
                    <div class="form-group">
                        <label>Sitio Web Actual</label>
                        <input type="text" name="Sitio_Actual" placeholder="www.ejemplo.com">
                        <p class="help-text">URL actual si existe</p>
                    </div>
                </div>

                <div class="form-group">
                    <label>Tipo de Negocio <span class="required">*</span></label>
                    <input type="text" name="Tipo_Negocio" placeholder="Ej: Consultoría médica, E-commerce, etc." required>
                </div>
            </div>

            <!-- ESTADO ACTUAL DEL SITIO -->
            <div class="form-section">
                <div class="section-header">
                    <div class="section-icon">🔍</div>
                    <h2>Estado Actual del Sitio</h2>
                </div>

                <div class="form-group">
                    <label>¿Cuál es la tecnología actual? <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="tech1" name="Tecnologia" value="HTML/CSS/JavaScript estático" required>
                            <label for="tech1" class="radio-label">HTML/CSS/JavaScript estático</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="tech2" name="Tecnologia" value="WordPress o similar CMS">
                            <label for="tech2" class="radio-label">WordPress o similar CMS</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="tech3" name="Tecnologia" value="Framework moderno">
                            <label for="tech3" class="radio-label">Framework moderno (Laravel, React, Vue, etc.)</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="tech4" name="Tecnologia" value="Otro">
                            <label for="tech4" class="radio-label">Otro</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="tech5" name="Tecnologia" value="No tengo sitio web aún">
                            <label for="tech5" class="radio-label">No tengo sitio web aún</label>
                        </div>
                    </div>
                </div>

                <div class="two-columns">
                    <div class="form-group">
                        <label>¿Cuántas páginas tiene aproximadamente? <span class="required">*</span></label>
                        <select name="Cantidad_Paginas" required>
                            <option value="">Selecciona...</option>
                            <option value="1-5 páginas">1-5 páginas</option>
                            <option value="6-15 páginas">6-15 páginas</option>
                            <option value="16-30 páginas">16-30 páginas</option>
                            <option value="30-50 páginas">30-50 páginas</option>
                            <option value="Más de 50 páginas">Más de 50 páginas</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>¿Cuál es el estado actual? <span class="required">*</span></label>
                        <select name="Estado_Sitio" required>
                            <option value="">Selecciona...</option>
                            <option value="Muy obsoleto (>5 años)">Muy obsoleto (>5 años)</option>
                            <option value="Obsoleto (3-5 años)">Obsoleto (3-5 años)</option>
                            <option value="Desactualizado (1-3 años)">Desactualizado (1-3 años)</option>
                            <option value="Reciente pero sin dinamismo">Reciente pero sin dinamismo</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>¿Hay contenido importante que conservar?</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="content1" name="Contenido_Conservar" value="Textos/Contenido">
                            <label for="content1" class="checkbox-label">Textos/Contenido</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="content2" name="Contenido_Conservar" value="Imágenes">
                            <label for="content2" class="checkbox-label">Imágenes</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="content3" name="Contenido_Conservar" value="Base de datos/Datos">
                            <label for="content3" class="checkbox-label">Base de datos/Datos importantes</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="content4" name="Contenido_Conservar" value="Comenzar de cero">
                            <label for="content4" class="checkbox-label">Comenzar de cero</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- FUNCIONALIDADES REQUERIDAS -->
            <div class="form-section">
                <div class="section-header">
                    <div class="section-icon">⚙️</div>
                    <h2>Funcionalidades Requeridas</h2>
                </div>

                <div class="form-group">
                    <label>¿Qué funcionalidades necesitas? (selecciona todas las que apliquen)</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="func1" name="Funcionalidades" value="Diseño responsivo">
                            <label for="func1" class="checkbox-label">Diseño responsivo (móvil, tablet, desktop)</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="func2" name="Funcionalidades" value="Blog/Sistema de noticias">
                            <label for="func2" class="checkbox-label">Blog/Sistema de noticias</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="func3" name="Funcionalidades" value="E-commerce/Tienda online">
                            <label for="func3" class="checkbox-label">E-commerce/Tienda online</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="func4" name="Funcionalidades" value="Sistema de reservas/citas">
                            <label for="func4" class="checkbox-label">Sistema de reservas/citas</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="func5" name="Funcionalidades" value="Formularios de contacto avanzados">
                            <label for="func5" class="checkbox-label">Formularios de contacto avanzados</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="func6" name="Funcionalidades" value="Panel de administración">
                            <label for="func6" class="checkbox-label">Panel de administración</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="func7" name="Funcionalidades" value="Chat en vivo/Chatbot">
                            <label for="func7" class="checkbox-label">Chat en vivo / Chatbot</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="func8" name="Funcionalidades" value="Integraciones externas">
                            <label for="func8" class="checkbox-label">Integraciones externas (CRM, Analytics, etc.)</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="func9" name="Funcionalidades" value="SEO optimizado">
                            <label for="func9" class="checkbox-label">SEO optimizado</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="func10" name="Funcionalidades" value="Sitio multiidioma">
                            <label for="func10" class="checkbox-label">Sitio multiidioma</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>¿Necesita integraciones específicas?</label>
                    <textarea name="Integraciones_Especiales" placeholder="Ej: Integración con sistema de facturación, API de proveedores, etc."></textarea>
                </div>
            </div>

            <!-- DISEÑO Y UX -->
            <div class="form-section">
                <div class="section-header">
                    <div class="section-icon">🎨</div>
                    <h2>Diseño y Experiencia del Usuario</h2>
                </div>

                <div class="form-group">
                    <label>¿Tienes una identidad visual definida? <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="brand1" name="Identidad_Visual" value="Sí, tengo logo y guía de marca" required>
                            <label for="brand1" class="radio-label">Sí, tengo logo, colores y guía de marca</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="brand2" name="Identidad_Visual" value="Parcialmente (logo sí)">
                            <label for="brand2" class="radio-label">Parcialmente (logo sí, pero sin guía)</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="brand3" name="Identidad_Visual" value="No, necesito ayuda">
                            <label for="brand3" class="radio-label">No, necesito ayuda con el diseño</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>¿Tienes referencias de diseño que te gusten?</label>
                    <textarea name="Referencias_Diseño" placeholder="Describe sitios web que te inspiren..."></textarea>
                </div>

                <div class="form-group">
                    <label>¿Qué objetivo principal tiene el sitio? <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="objetivo1" name="Objetivo_Sitio" value="Vender productos/servicios" required>
                            <label for="objetivo1" class="radio-label">Vender productos/servicios (E-commerce)</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="objetivo2" name="Objetivo_Sitio" value="Generar leads/contactos">
                            <label for="objetivo2" class="radio-label">Generar leads/contactos</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="objetivo3" name="Objetivo_Sitio" value="Informar sobre empresa">
                            <label for="objetivo3" class="radio-label">Informar sobre la empresa/servicios</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="objetivo4" name="Objetivo_Sitio" value="Crear comunidad/portal">
                            <label for="objetivo4" class="radio-label">Crear comunidad/portal</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="objetivo5" name="Objetivo_Sitio" value="Otro">
                            <label for="objetivo5" class="radio-label">Otro</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PRESUPUESTO Y TIMELINE -->
            <div class="form-section">
                <div class="section-header">
                    <div class="section-icon">💰</div>
                    <h2>Presupuesto y Timeline</h2>
                </div>

                <div class="form-group">
                    <label>¿Cuál es tu rango presupuestario aproximado? <span class="required">*</span></label>
                    <select name="Presupuesto" required>
                        <option value="">Selecciona...</option>
                        <option value="$1.500.000 - $3.000.000 COP">$1.500.000 - $3.000.000 COP</option>
                        <option value="$3.000.000 - $6.000.000 COP">$3.000.000 - $6.000.000 COP</option>
                        <option value="$6.000.000 - $12.000.000 COP">$6.000.000 - $12.000.000 COP</option>
                        <option value="$12.000.000 - $24.000.000 COP">$12.000.000 - $24.000.000 COP</option>
                        <option value="$24.000.000 - $40.000.000 COP">$24.000.000 - $40.000.000 COP</option>
                        <option value="$40.000.000+ COP">$40.000.000+ COP</option>
                        <option value="Flexible, depende del proyecto">Flexible, depende del proyecto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>¿Cuándo necesitas que esté listo? <span class="required">*</span></label>
                    <select name="Timeline" required>
                        <option value="">Selecciona...</option>
                        <option value="2-4 semanas (urgente)">2-4 semanas (urgente)</option>
                        <option value="1-2 meses">1-2 meses</option>
                        <option value="2-3 meses">2-3 meses</option>
                        <option value="Más de 3 meses">Más de 3 meses</option>
                        <option value="Sin prisa, flexible">Sin prisa, flexible</option>
                    </select>
                </div>
            </div>

            <!-- INFORMACIÓN ADICIONAL -->
            <div class="form-section">
                <div class="section-header">
                    <div class="section-icon">📝</div>
                    <h2>Información Adicional</h2>
                </div>

                <div class="form-group">
                    <label>¿Ya tienes hosting/dominio?</label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="hosting1" name="Hosting_Dominio" value="Sí, ya tengo ambos">
                            <label for="hosting1" class="radio-label">Sí, ya tengo ambos</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="hosting2" name="Hosting_Dominio" value="Solo dominio">
                            <label for="hosting2" class="radio-label">Solo dominio</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="hosting3" name="Hosting_Dominio" value="No, necesito ayuda">
                            <label for="hosting3" class="radio-label">No, necesito ayuda</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>¿Necesitas soporte/mantenimiento después del lanzamiento?</label>
                    <textarea name="Soporte_Mantenimiento" placeholder="Ej: Actualizaciones mensuales, correcciones, cambio de contenido, etc."></textarea>
                </div>

                <div class="form-group">
                    <label>Comentarios o información adicional</label>
                    <textarea name="Comentarios" placeholder="Cuéntame cualquier otra cosa que consideres importante..."></textarea>
                </div>
            </div>

            <!-- BOTONES -->
            <div class="form-buttons">
                <button type="reset" class="btn-reset">Limpiar formulario</button>
                <button type="submit" class="btn-submit">📧 Enviar evaluación</button>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('evaluationForm');
        const progressFill = document.getElementById('progressFill');

        // Actualizar barra de progreso
        form.addEventListener('input', updateProgress);
        form.addEventListener('change', updateProgress);

        function updateProgress() {
            const requiredFields = form.querySelectorAll('[required]');
            let filled = 0;

            requiredFields.forEach(field => {
                if (field.type === 'radio') {
                    const group = form.querySelectorAll(`input[name="${field.name}"]`);
                    if (Array.from(group).some(radio => radio.checked)) {
                        filled++;
                    }
                } else if (field.value.trim() !== '') {
                    filled++;
                }
            });

            const uniqueRequired = new Set();
            requiredFields.forEach(field => {
                if (field.type === 'radio') {
                    uniqueRequired.add(field.name);
                } else {
                    uniqueRequired.add(field);
                }
            });

            const progress = (filled / uniqueRequired.size) * 100;
            progressFill.style.width = Math.min(progress, 100) + '%';
        }

        // Manejar envío
        form.addEventListener('submit', function(e) {
            const submitBtn = form.querySelector('.btn-submit');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Enviando...';
        });

        updateProgress();
    </script>
</body>
</html>
